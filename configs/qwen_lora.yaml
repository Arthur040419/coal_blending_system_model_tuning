# LoRA fine-tuning config for coal blending model
# HuggingFace 上 4B Instruct 权重为 Qwen3-4B-Instruct-2507（无 Qwen3-4B-Instruct 此仓库名）
# Ollama 侧 tag 如 qwen3:4b 与 HF 源可能命名不同，以各自文档为准
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
output_dir: outputs/adapters/qwen-coal-lora

max_seq_length: 2048
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_ratio: 0.03
logging_steps: 5
eval_steps: 20
save_steps: 20

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# 4-bit QLoRA — auto-enabled for CUDA, ignored on MPS/CPU.
# On Mac M4 MPS: runs fp16 without quantization.
# On cloud GPU (T4/A10): 4-bit saves ~75% VRAM.
use_4bit: true
bf16: false
fp16: true

# Set true only if the model tokenizer chat template supports assistant token masks.
assistant_only_loss: false

# Keep false for real training. CPU training is only suitable for tiny smoke-test models.
allow_cpu_training: false
