# LoRA fine-tuning config for coal blending model.
# Ollama 的 qwen3:4b 是运行时 tag；Transformers/PEFT 训练需要使用
# 对应的 HuggingFace 模型名或本地 HF 格式权重目录。
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
output_dir: outputs/adapters/qwen3-4b-coal-lora

max_seq_length: 2048
# The mixed all-task dataset is long. The training script now fails fast if target
# JSON would be truncated; prefer configs/qwen_lora_candidate.yaml for current experiments.
sft_format: prompt_completion
completion_only_loss: true
fail_on_truncated_completion: true
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_ratio: 0.03
logging_steps: 5
eval_steps: 20
save_steps: 20

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# 4-bit QLoRA — auto-enabled for CUDA, ignored on MPS/CPU.
# On Mac M4 MPS: runs fp16 without quantization.
# On cloud GPU (T4/A10): 4-bit saves ~75% VRAM.
use_4bit: true
bf16: false
fp16: true

# Set true only if the model tokenizer chat template supports assistant token masks.
assistant_only_loss: false

# Keep false for real training. CPU training is only suitable for tiny smoke-test models.
allow_cpu_training: false
