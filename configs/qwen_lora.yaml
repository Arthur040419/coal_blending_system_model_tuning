# LoRA fine-tuning config for coal blending model.
# Ollama 的 qwen2.5:1.5b 对应 HuggingFace 训练权重通常使用 Qwen/Qwen2.5-1.5B-Instruct。
# Ollama tag 不能直接作为 transformers 的 model_name_or_path 使用。
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
output_dir: outputs/adapters/qwen2.5-1.5b-coal-lora

max_seq_length: 2048
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_ratio: 0.03
logging_steps: 5
eval_steps: 20
save_steps: 20

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# 4-bit QLoRA — auto-enabled for CUDA, ignored on MPS/CPU.
# On Mac M4 MPS: runs fp16 without quantization.
# On cloud GPU (T4/A10): 4-bit saves ~75% VRAM.
use_4bit: true
bf16: false
fp16: true

# Set true only if the model tokenizer chat template supports assistant token masks.
assistant_only_loss: false

# Keep false for real training. CPU training is only suitable for tiny smoke-test models.
allow_cpu_training: false
