# Suggested baseline for a small, reproducible graduation-project experiment.
# Adjust model_name_or_path to a local path if you have already downloaded the model.
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
train_file: data/processed/train.jsonl
eval_file: data/processed/eval.jsonl
output_dir: outputs/adapters/qwen-coal-lora

max_seq_length: 2048
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
warmup_ratio: 0.03
logging_steps: 5
eval_steps: 20
save_steps: 20

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

use_4bit: false
bf16: false
fp16: true

