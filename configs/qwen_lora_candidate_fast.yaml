# Fast candidate-generation-only LoRA config for limited Windows GPUs.
# Use this when the full config is too slow or unstable. It trains on a small
# deterministic subset, skips in-training evaluation, and saves at the end.
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
train_file: data/processed_candidate/train.jsonl
eval_file: data/processed_candidate/eval.jsonl
output_dir: outputs/adapters/qwen3-4b-coal-candidate-lora-fast
datasets_cache_dir: outputs/cache/datasets

max_seq_length: 4096
sft_format: prompt_completion
filter_task: candidate_generation
completion_only_loss: true
assistant_only_loss: false
fail_on_truncated_completion: true

# Keep the first run short enough to finish and produce a usable adapter.
max_train_samples: 24
max_eval_samples: 4
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
gradient_checkpointing: true
learning_rate: 0.0001
warmup_ratio: 0.05
logging_steps: 1
eval_strategy: "no"
save_strategy: "epoch"
save_total_limit: 1
eval_steps: 1000
save_steps: 1000

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

use_4bit: true
bf16: false
fp16: true
allow_cpu_training: false
